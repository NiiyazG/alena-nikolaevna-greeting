<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Алёна Николаевна</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrapper {
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: #6b7280;
      font-size: 1.1rem;
      margin-bottom: 24px;
    }
    .btn {
      background: #111827;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 24px rgba(0,0,0,0.2);
    }
    #surprise {
      display: none;
      margin-top: 32px;
    }
    .footer {
      text-align: center;
      color: #9ca3af;
      font-size: 0.85rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Алёна Николаевна</h1>
    <div class="subtitle">Приветствие</div>
    <button class="btn" onclick="document.getElementById('surprise').style.display='block'">✨ Открыть сюрприз</button>

    <div id="surprise">
      <p>Спасибо, что заглянули! Пусть ваш день будет таким же ярким, как этот сюрприз. 🌟</p>
    </div>

    <div class="footer">Сделано с ❤️ • NiiyazG • 2026</div>
  </div>
</body>
</html>
